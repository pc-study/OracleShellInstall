      - heading "系统要求" [level=3] [ref=e100]
      - list [ref=e101]:
        - listitem [ref=e102]: 支持的操作系统：CentOS 7/8、RHEL 7/8/9、OracleLinux、Rocky Linux、Anolis OS、openEuler、麒麟 Kylin、统信 UOS、Ubuntu、Debian 等
        - listitem [ref=e103]: Bash 版本 >= 4
        - listitem [ref=e104]: 建议内存 >= 2GB（生产环境建议 >= 8GB）
        - listitem [ref=e105]: 磁盘空间：Oracle 软件至少 15GB，数据文件根据业务需求规划
        - listitem [ref=e106]:
          - text: 网络：确保 yum/dnf/apt 软件源可用，或使用本地源 (
          - code [ref=e107]: "-lrp Y"
          - text: )
        - listitem [ref=e108]: SELinux：脚本会自动关闭 SELinux，无需手动处理
        - listitem [ref=e109]: 防火墙：脚本会自动关闭防火墙，如需保留请安装后自行配置
