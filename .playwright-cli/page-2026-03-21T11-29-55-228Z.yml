      - heading "快速开始" [level=2] [ref=e62]
      - paragraph [ref=e63]: OracleShellInstall 是一款 Oracle 数据库一键自动化安装脚本，支持 Oracle 11gR2 至 26ai 全版本，覆盖 20+ Linux 发行版。脚本会自动完成操作系统参数配置、依赖包安装、用户创建、Oracle 软件安装及数据库创建全流程。
      - heading "三步安装" [level=3] [ref=e64]
      - list [ref=e65]:
        - listitem [ref=e66]:
          - strong [ref=e67]: 上传软件包
          - text: "- 将"
          - code [ref=e68]: OracleShellInstall.sh
          - text: 脚本和 Oracle 安装介质上传至服务器
          - code [ref=e69]: /soft
          - text: 目录
        - listitem [ref=e70]:
          - strong [ref=e71]: 配置参数
          - text: "- 使用"
          - link "命令生成器" [ref=e72] [cursor=pointer]:
            - /url: generator.html
          - text: 或手动拼接安装参数
        - listitem [ref=e73]:
          - strong [ref=e74]: 执行安装
          - text: "- 在"
          - code [ref=e75]: /soft
          - text: 目录下以
          - code [ref=e76]: root
          - text: 用户执行生成的命令
      - generic [ref=e77]:
        - strong [ref=e78]: 注意：
        - text: 脚本必须以 root 用户执行，且需要在软件包所在目录下运行。Bash 版本需 >= 4。
