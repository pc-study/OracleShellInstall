      - heading "故障排查" [level=2] [ref=e798]
      - heading "安装失败的通用排查步骤" [level=3] [ref=e799]
      - list [ref=e800]:
        - listitem [ref=e801]:
          - text: 查看详细输出日志：
          - code [ref=e802]: cat /soft/print_shell_install_*.log
        - listitem [ref=e803]:
          - text: 查看安装摘要日志：
          - code [ref=e804]: cat /soft/shell_install_output_*.log
        - listitem [ref=e805]: 定位失败的具体步骤和错误信息
        - listitem [ref=e806]:
          - text: 修复问题后，使用
          - code [ref=e807]: "-m Y"
          - text: 跳过 OS 配置重新执行
      - heading "常见错误及解决方案" [level=3] [ref=e808]
      - heading "依赖包安装失败" [level=4] [ref=e809]
      - paragraph [ref=e810]:
        - strong [ref=e811]: 错误表现：
        - text: 提示 yum/dnf 无法安装某些 RPM 包。
      - paragraph [ref=e812]:
        - strong [ref=e813]: 解决方案：
      - list [ref=e814]:
        - listitem [ref=e815]:
          - text: 检查是否配置了正确的软件源，或使用
          - code [ref=e816]: "-lrp Y"
          - text: 配置本地源
        - listitem [ref=e817]:
          - text: 如需网络源，设置
          - code [ref=e818]: "-nrp Y"
          - text: ，确保服务器可访问外网
        - listitem [ref=e819]: 对于国产系统（麒麟、统信），确保系统自带软件源完整
      - heading "ASM 磁盘无法发现" [level=4] [ref=e820]
      - paragraph [ref=e821]:
        - strong [ref=e822]: 错误表现：
        - text: Grid 安装完成后 ASM 无法发现磁盘设备。
      - paragraph [ref=e823]:
        - strong [ref=e824]: 解决方案：
      - list [ref=e825]:
        - listitem [ref=e826]:
          - text: 检查磁盘设备是否存在：
          - code [ref=e827]: ls -l /dev/sd*
        - listitem [ref=e828]:
          - text: 确认磁盘未被分区或挂载：
          - code [ref=e829]: lsblk
        - listitem [ref=e830]:
          - text: 检查 UDEV 规则是否生效：
          - code [ref=e831]: ls -l /dev/oracleasm/
        - listitem [ref=e832]:
          - text: 如使用 multipath，检查多路径配置：
          - code [ref=e833]: multipath -ll
        - listitem [ref=e834]:
          - text: VirtualBox 环境必须添加
          - code [ref=e835]: "-vbox Y"
          - text: 参数
      - heading "RAC SSH 互信失败" [level=4] [ref=e836]
      - paragraph [ref=e837]:
        - strong [ref=e838]: 错误表现：
        - text: 节点间无法建立 SSH 连接，提示 Permission denied。
      - paragraph [ref=e839]:
        - strong [ref=e840]: 解决方案：
      - list [ref=e841]:
        - listitem [ref=e842]: 确认所有节点 root 密码一致
        - listitem [ref=e843]:
          - text: 检查
          - code [ref=e844]: /etc/ssh/sshd_config
          - text: 是否允许 root 登录和密码认证
        - listitem [ref=e845]:
          - text: 确认所有节点间网络互通：
          - code [ref=e846]: ping
          - text: 测试公网和心跳 IP
      - heading "内存不足导致 DBCA 失败" [level=4] [ref=e847]
      - paragraph [ref=e848]:
        - strong [ref=e849]: 错误表现：
        - text: 创建数据库时提示内存不足或 ORA-00845 错误。
      - paragraph [ref=e850]:
        - strong [ref=e851]: 解决方案：
      - list [ref=e852]:
        - listitem [ref=e853]: 确保可用内存 >= 2GB
        - listitem [ref=e854]:
          - text: 如启用了大页内存 (
          - code [ref=e855]: "-hf Y"
          - text: )，确保 HugePages 配置正确
        - listitem [ref=e856]:
          - text: 检查
          - code [ref=e857]: /dev/shm
          - text: 是否挂载且大小足够
      - heading "OPatch 版本过低" [level=4] [ref=e858]
      - paragraph [ref=e859]:
        - strong [ref=e860]: 错误表现：
        - text: 打补丁时提示 OPatch 版本不兼容。
      - paragraph [ref=e861]:
        - strong [ref=e862]: 解决方案：
        - text: 下载最新的 OPatch 工具 (
        - code [ref=e863]: p6880880
        - text: ) 放入
        - code [ref=e864]: /soft
        - text: 目录，脚本会自动替换旧版本。
      - heading "常见问题" [level=2] [ref=e865]
      - 'heading "Q: 脚本支持哪些 Oracle 安装介质格式？" [level=3] [ref=e866]'
      - paragraph [ref=e867]: 脚本自动识别 Oracle 安装介质的 ZIP 包。将 ZIP 文件放置在 /soft 目录下即可，无需手动解压。
      - 'heading "Q: 安装过程中断了怎么办？" [level=3] [ref=e868]'
      - paragraph [ref=e869]:
        - text: 查看安装日志文件
        - code [ref=e870]: print_shell_install_*.log
        - text: 和
        - code [ref=e871]: shell_install_output_*.log
        - text: ，定位失败原因。修复后可使用
        - code [ref=e872]: "-m Y"
        - text: 参数跳过已完成的 OS 配置步骤。
      - 'heading "Q: RAC 安装时节点间需要什么网络条件？" [level=3] [ref=e873]'
      - paragraph [ref=e874]: 需要公网和心跳网络互通，所有节点 root 密码需一致。脚本会自动建立 SSH 互信。
      - 'heading "Q: 数据库密码有什么要求？" [level=3] [ref=e875]'
      - paragraph [ref=e876]:
        - text: 数据库密码（
        - code [ref=e877]: "-dp"
        - text: ）必须以字母开头，只能包含字母、数字及
        - code [ref=e878]: _
        - code [ref=e879]: "#"
        - code [ref=e880]: $
        - text: 三种特殊字符。包含特殊字符时需用单引号包裹。
      - 'heading "Q: 如何过滤多路径磁盘？" [level=3] [ref=e881]'
      - paragraph [ref=e882]:
        - text: 使用
        - code [ref=e883]: "-fd"
        - text: 参数可以过滤多路径磁盘，去除重复路径获取唯一盘符。例如：
        - code [ref=e884]: "-fd /dev/sda"
        - text: 排除系统盘。
      - 'heading "Q: 是否支持离线安装？" [level=3] [ref=e885]'
      - paragraph [ref=e886]:
        - text: 支持。使用
        - code [ref=e887]: "-lrp Y"
        - text: 参数配置本地软件源（需要系统安装 ISO），脚本会自动挂载 ISO 并配置本地 yum/dnf 源，无需外网连接。
      - 'heading "Q: 如何在已有 Oracle 环境上安装第二个数据库？" [level=3] [ref=e888]'
      - paragraph [ref=e889]:
        - text: 使用
        - code [ref=e890]: "-o"
        - text: 参数指定新的数据库名即可。脚本会检测现有环境，跳过已完成的配置步骤。也可以使用
        - code [ref=e891]: "-m Y"
        - text: 跳过 OS 配置只创建数据库。
      - 'heading "Q: 脚本是否修改了操作系统的哪些配置？" [level=3] [ref=e892]'
      - paragraph [ref=e893]: 脚本会修改以下系统配置：
      - list [ref=e894]:
        - listitem [ref=e895]:
          - text: 主机名和
          - code [ref=e896]: /etc/hosts
        - listitem [ref=e897]:
          - text: 内核参数 (
          - code [ref=e898]: /etc/sysctl.conf
          - text: )
        - listitem [ref=e899]:
          - text: 资源限制 (
          - code [ref=e900]: /etc/security/limits.conf
          - text: )
        - listitem [ref=e901]: 关闭 SELinux 和防火墙
        - listitem [ref=e902]: 创建 oracle/grid 用户及用户组
        - listitem [ref=e903]: 配置 NTP/Chrony 时间同步
        - listitem [ref=e904]:
          - text: 配置用户环境变量 (
          - code [ref=e905]: .bash_profile
          - text: )
      - 'heading "Q: 支持 ARM 架构服务器吗？" [level=3] [ref=e906]'
      - paragraph [ref=e907]: 支持。脚本会自动检测 CPU 架构（x86_64/aarch64），并使用对应的安装介质和依赖包。需要确保使用对应架构的 Oracle 安装介质。
      - 'heading "Q: 如何卸载由脚本安装的 Oracle？" [level=3] [ref=e908]'
      - paragraph [ref=e909]:
        - text: 脚本不提供卸载功能。手动卸载步骤：停止数据库和监听器 → 删除 Oracle 目录 → 删除用户和用户组 → 清理系统配置 → 清理
        - code [ref=e910]: /etc/oraInst.loc
        - text: 和
        - code [ref=e911]: /etc/oratab
        - text: 。
      - heading "更新日志" [level=2] [ref=e912]
      - heading "v5.0.0 (2024-08-22)" [level=3] [ref=e913]
