      - generic [ref=e152]:
        - strong [ref=e153]: 提示：
        - text: 19c 及以上版本安装包只需一个 ZIP 文件。11gR2 需要多个分卷文件。补丁文件（PSU/RU/OJVM）和 OPatch 工具放置在同一目录即可，脚本会自动识别。
      - heading "工作原理" [level=2] [ref=e154]
      - paragraph [ref=e155]: OracleShellInstall 脚本按照以下流程自动完成整个安装过程：
      - heading "执行流程" [level=3] [ref=e156]
      - list [ref=e157]:
        - listitem [ref=e158]:
          - strong [ref=e159]: 参数校验
          - text: "- 验证所有输入参数的合法性，检查必填项，校验密码格式"
        - listitem [ref=e160]:
          - strong [ref=e161]: 环境检测
          - text: "- 识别操作系统类型和版本，检测 CPU 架构，检查磁盘空间"
        - listitem [ref=e162]:
          - strong [ref=e163]: OS 配置
          - text: "- 配置主机名、hosts、内核参数、资源限制、关闭 SELinux/防火墙、配置 NTP 时间同步"
        - listitem [ref=e164]:
          - strong [ref=e165]: 依赖安装
          - text: "- 根据 OS 类型自动配置软件源，安装 Oracle 所需的依赖包"
        - listitem [ref=e166]:
          - strong [ref=e167]: 用户创建
          - text: "- 创建 oracle/grid 用户及 oinstall、dba、asmadmin 等用户组，配置环境变量"
        - listitem [ref=e168]:
          - strong [ref=e169]: 目录准备
          - text: "- 创建 ORACLE_BASE、ORACLE_HOME 等目录结构并设置权限"
        - listitem [ref=e170]:
          - strong [ref=e171]: 磁盘配置
          - text: (ASM/RAC) - 通过 UDEV 规则或 multipath 配置 ASM 磁盘
        - listitem [ref=e172]:
          - strong [ref=e173]: Grid 安装
          - text: (ASM/RAC) - 解压并安装 Grid Infrastructure，创建 ASM 磁盘组
        - listitem [ref=e174]:
          - strong [ref=e175]: SSH 互信
          - text: (RAC) - 在所有节点间建立 root、oracle、grid 用户的 SSH 无密码登录
        - listitem [ref=e176]:
          - strong [ref=e177]: 数据库软件安装
          - text: "- 解压 Oracle 安装介质，静默安装数据库软件"
        - listitem [ref=e178]:
          - strong [ref=e179]: 补丁应用
          - text: (可选) - 应用 PSU/RU、OJVM 补丁
        - listitem [ref=e180]:
          - strong [ref=e181]: 数据库创建
          - text: "- 使用 DBCA 静默创建数据库实例，创建 PDB（如指定）"
        - listitem [ref=e182]:
          - strong [ref=e183]: 安装后配置
          - text: "- 配置自动启动、优化参数（如指定）、配置大页内存（如指定）"
      - heading "日志文件" [level=3] [ref=e184]
      - paragraph [ref=e185]: 安装过程中会生成两个日志文件：
      - list [ref=e186]:
        - listitem [ref=e187]:
          - code [ref=e188]: print_shell_install_*.log
          - text: "- 详细输出日志，记录所有命令的标准输出和错误输出"
        - listitem [ref=e189]:
          - code [ref=e190]: shell_install_output_*.log
          - text: "- 安装摘要日志，记录关键步骤的执行结果"
      - generic [ref=e191]:
        - strong [ref=e192]: 日志位置：
        - text: 日志文件生成在脚本执行的当前目录（通常为
        - code [ref=e193]: /soft
        - text: ），文件名包含时间戳，便于区分多次安装。
      - heading "单机安装" [level=2] [ref=e194]
      - paragraph [ref=e195]: 单机模式基于文件系统存储，适用于开发测试及中小型业务场景。
      - heading "最简安装" [level=3] [ref=e196]
      - generic [ref=e197]:
        - generic [ref=e202]: Terminal
        - generic [ref=e203]:
          - generic [ref=e204]: sh OracleShellInstall.sh \
          - generic [ref=e205]: "-install_mode single `# 单机模式`\\"
          - generic [ref=e206]: "-lf eth0 `# 公网网卡名称`"
        - button "Copy" [ref=e207] [cursor=pointer]:
          - img [ref=e208]
          - text: Copy
      - paragraph [ref=e211]: 以上命令使用全部默认值安装：数据库名 orcl，字符集 AL32UTF8，安装目录 /u01，数据目录 /oradata。
      - heading "自定义安装" [level=3] [ref=e212]
      - generic [ref=e213]:
        - generic [ref=e218]: Terminal
        - generic [ref=e219]:
          - generic [ref=e220]: sh OracleShellInstall.sh \
          - generic [ref=e221]: "-install_mode single `# 单机模式`\\"
          - generic [ref=e222]: "-lf eth0 `# 公网网卡名称`\\"
          - generic [ref=e223]: "-n oracledb `# 主机名`\\"
          - generic [ref=e224]: "-o prod `# 数据库名称`\\"
          - generic [ref=e225]: "-dp 'Passw0rd#' `# 数据库密码`\\"
          - generic [ref=e226]: "-ds ZHS16GBK `# 字符集`\\"
          - generic [ref=e227]: "-pdb pdb01,pdb02 `# 创建多个 PDB`\\"
          - generic [ref=e228]: "-opd Y `# 优化数据库参数`"
        - button "Copy" [ref=e229] [cursor=pointer]:
          - img [ref=e230]
          - text: Copy
      - heading "单机 ASM 安装" [level=2] [ref=e233]
      - paragraph [ref=e234]: 单机 ASM 模式需要 Grid Infrastructure 和 ASM 磁盘。脚本会自动配置 UDEV 绑盘或 multipath。
      - generic [ref=e235]:
        - generic [ref=e240]: Terminal
        - generic [ref=e241]:
          - generic [ref=e242]: sh OracleShellInstall.sh \
          - generic [ref=e243]: "-install_mode standalone `# 单机 ASM 模式`\\"
          - generic [ref=e244]: "-lf eth0 `# 公网网卡名称`\\"
          - generic [ref=e245]: "-dd /dev/sdb,/dev/sdc `# DATA 磁盘`"
        - button "Copy" [ref=e246] [cursor=pointer]:
          - img [ref=e247]
          - text: Copy
      - generic [ref=e250]:
        - strong [ref=e251]: 提示：
        - text: 如果不使用 multipath，可设置
        - code [ref=e252]: "-mp N"
        - text: ，脚本将使用 UDEV 直接绑盘。如果已自行配置好 ASM 磁盘，可设置
        - code [ref=e253]: "-adc N"
        - text: 并传入已配置好的磁盘路径。
      - heading "自定义 ASM 安装" [level=3] [ref=e254]
      - generic [ref=e255]:
        - generic [ref=e260]: Terminal
        - generic [ref=e261]:
          - generic [ref=e262]: sh OracleShellInstall.sh \
          - generic [ref=e263]: "-install_mode standalone `# 单机 ASM 模式`\\"
          - generic [ref=e264]: "-lf eth0 `# 公网网卡名称`\\"
          - generic [ref=e265]: "-o prod `# 数据库名称`\\"
          - generic [ref=e266]: "-dp 'Passw0rd#' `# 数据库密码`\\"
          - generic [ref=e267]: "-mp N `# 不使用 multipath`\\"
          - generic [ref=e268]: "-dd /dev/sdb,/dev/sdc,/dev/sdd `# 3 块 DATA 磁盘`\\"
          - generic [ref=e269]: "-dn DATADG `# 自定义磁盘组名`\\"
          - generic [ref=e270]: "-dr NORMAL `# NORMAL 冗余`\\"
          - generic [ref=e271]: "-gpa 35940989 `# Grid 补丁`\\"
          - generic [ref=e272]: "-opa 35940989 `# Oracle 补丁`"
        - button "Copy" [ref=e273] [cursor=pointer]:
          - img [ref=e274]
          - text: Copy
      - generic [ref=e277]:
        - strong [ref=e278]: 注意：
        - text: NORMAL 冗余至少需要 3 块磁盘，HIGH 冗余至少需要 5 块磁盘。EXTERNAL 冗余为外部冗余（不做镜像），仅需 1 块磁盘。
      - heading "RAC 集群安装" [level=2] [ref=e279]
      - paragraph [ref=e280]: RAC 模式需要在第一个节点上执行脚本，脚本会自动配置所有节点的 SSH 互信、Grid 安装、ASM 磁盘及数据库创建。
      - generic [ref=e281]:
        - strong [ref=e282]: RAC 前置条件：
        - list [ref=e283]:
          - listitem [ref=e284]: 所有节点的 root 密码必须一致
          - listitem [ref=e285]: 所有节点需配置公网和心跳网络，且网络互通
          - listitem [ref=e286]: 共享磁盘需在所有节点上可见（SAN/iSCSI/共享 VMDK 等）
          - listitem [ref=e287]: 脚本仅需在第一个节点执行，会自动同步到其他节点
      - heading "基础 2 节点 RAC" [level=3] [ref=e288]
      - generic [ref=e289]:
        - generic [ref=e294]: Terminal
        - generic [ref=e295]:
          - generic [ref=e296]: sh OracleShellInstall.sh \
          - generic [ref=e297]: "-install_mode rac `# RAC 集群模式`\\"
          - generic [ref=e298]: "-lf eth0 `# 公网网卡`\\"
          - generic [ref=e299]: "-pf eth1,eth2 `# 心跳网卡`\\"
          - generic [ref=e300]: "-n orcl `# 主机名前缀`\\"
          - generic [ref=e301]: "-hn orcl01,orcl02 `# 所有节点主机名`\\"
          - generic [ref=e302]: "-ri 10.0.0.101,10.0.0.102 `# 公网 IP`\\"
          - generic [ref=e303]: "-vi 10.0.0.103,10.0.0.104 `# 虚拟 IP`\\"
          - generic [ref=e304]: "-si 10.0.0.105 `# Scan IP`\\"
          - generic [ref=e305]: "-rp 'rootPasswd' `# root 密码`\\"
          - generic [ref=e306]: "-od /dev/sdb `# OCR 磁盘`\\"
          - generic [ref=e307]: "-dd /dev/sdc `# DATA 磁盘`"
        - button "Copy" [ref=e308] [cursor=pointer]:
          - img [ref=e309]
          - text: Copy
      - heading "生产环境 RAC（含 ARCH 磁盘组和补丁）" [level=3] [ref=e312]
      - generic [ref=e313]:
        - generic [ref=e318]: Terminal
        - generic [ref=e319]:
          - generic [ref=e320]: sh OracleShellInstall.sh \
          - generic [ref=e321]: "-install_mode rac `# RAC 集群模式`\\"
          - generic [ref=e322]: "-lf ens192 `# 公网网卡`\\"
          - generic [ref=e323]: "-pf ens224,ens256 `# 双心跳网卡`\\"
          - generic [ref=e324]: "-n dbprod `# 主机名前缀`\\"
          - generic [ref=e325]: "-hn dbprod01,dbprod02 `# 节点主机名`\\"
          - generic [ref=e326]: "-ri 192.168.1.101,192.168.1.102 `# 公网 IP`\\"
          - generic [ref=e327]: "-vi 192.168.1.103,192.168.1.104 `# 虚拟 IP`\\"
          - generic [ref=e328]: "-si 192.168.1.105 `# Scan IP`\\"
          - generic [ref=e329]: "-rp 'R00t#2024' `# root 密码`\\"
          - generic [ref=e330]: "-o proddb `# 数据库名称`\\"
