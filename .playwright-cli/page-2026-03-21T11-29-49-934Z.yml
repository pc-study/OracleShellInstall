  - generic [ref=e238]:
    - generic [ref=e239]:
      - generic [ref=e240]: 常见问题
      - generic [ref=e241]: 脚本订阅 FAQ
    - generic [ref=e242]:
      - generic [ref=e243]:
        - button "社区版和专业版的核心区别是什么？ ▼" [ref=e244] [cursor=pointer]:
          - generic [ref=e245]: 社区版和专业版的核心区别是什么？
          - generic [ref=e246]: ▼
        - paragraph [ref=e247]: 社区版支持单机和单机 ASM 模式，适用于 X86 架构和红帽系列系统，满足基础安装需求。专业版在此基础上增加了 RAC 集群（不限节点数）、ARM 架构、20+ 国产化操作系统、非官方认证组合安装、一键安装补丁、安装介质提供以及专属技术支持。
      - generic [ref=e248]:
        - button "专业版如何获取和付款？ ▼" [ref=e249] [cursor=pointer]:
          - generic [ref=e250]: 专业版如何获取和付款？
          - generic [ref=e251]: ▼
        - paragraph [ref=e252]: 请添加作者微信 Lucifer-0622、Telegram @LUCIFERLPC、Discord lucifer0622. 或 WhatsApp 咨询订阅详情，包括定价、授权方式和付款流程等。
      - generic [ref=e253]:
        - button "专业版包含哪些技术支持？ ▼" [ref=e254] [cursor=pointer]:
          - generic [ref=e255]: 专业版包含哪些技术支持？
          - generic [ref=e256]: ▼
        - paragraph [ref=e257]: 专业版包含专属微信群支持，群直播答疑，安装日志排错指导等。遇到安装问题可以直接在群内获得作者的技术支持。
      - generic [ref=e258]:
        - button "安装介质包含哪些内容？ ▼" [ref=e259] [cursor=pointer]:
          - generic [ref=e260]: 安装介质包含哪些内容？
          - generic [ref=e261]: ▼
        - paragraph [ref=e262]: 专业版提供系统镜像 ISO 文件、Oracle 各版本安装包以及 Grid/DB/OJVM 补丁文件等完整安装介质，免去自行下载的麻烦。
      - generic [ref=e263]:
        - button "社区版可以免费用于生产环境吗？ ▼" [ref=e264] [cursor=pointer]:
          - generic [ref=e265]: 社区版可以免费用于生产环境吗？
          - generic [ref=e266]: ▼
        - paragraph [ref=e267]: 社区版可免费使用，但仅支持单机/单机 ASM、X86 架构和红帽系列系统。如果生产环境需要 RAC 集群、ARM 架构或国产化系统支持，建议使用专业版。
      - generic [ref=e268]:
        - button "为什么 RAC、ARM、国产化系统等功能不在社区版中？ ▼" [ref=e269] [cursor=pointer]:
          - generic [ref=e270]: 为什么 RAC、ARM、国产化系统等功能不在社区版中？
          - generic [ref=e271]: ▼
        - paragraph [ref=e272]: RAC 集群、ARM 架构和 20+ 国产化操作系统的适配涉及大量的开发调试、兼容性测试和持续维护工作。每新增一个系统版本都需要在真实环境中反复验证，确保安装流程稳定可靠。专业版的订阅费用正是用于支撑这些持续投入的研发和测试成本，也是项目能够长期维护和迭代的基础。社区版的功能范围并非人为限制，而是作者在有限精力下优先保障的核心场景。
