name: "安装实录 / Install Report"
description: "分享您的 OracleShellInstall 安装体验 / Share your install experience"
title: "[安装实录] "
labels: ["install-report"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您分享安装体验！请填写以下信息，提交后将自动生成实战案例页面。
        Thanks for sharing! Fill in the fields below and a case study page will be auto-generated.

  - type: input
    id: os
    attributes:
      label: 操作系统 / Operating System
      description: "例如: CentOS 7.9 / Rocky Linux 9.3 / 麒麟 V10 / Ubuntu 22.04"
      placeholder: "CentOS 7.9"
    validations:
      required: true

  - type: dropdown
    id: oracle_version
    attributes:
      label: Oracle 版本 / Oracle Version
      options:
        - 11gR2
        - 12cR2
        - 19c
        - 21c
        - 23ai
        - 26ai
    validations:
      required: true

  - type: dropdown
    id: install_mode
    attributes:
      label: 安装模式 / Install Mode
      options:
        - 单机 / Single
        - 单机ASM / Single ASM
        - RAC
    validations:
      required: true

  - type: input
    id: server_config
    attributes:
      label: 服务器配置 / Server Config
      description: "例如: 4C 8G 100G / VMware 虚拟机"
      placeholder: "4C 8G 100G"
    validations:
      required: true

  - type: textarea
    id: install_command
    attributes:
      label: 安装命令 / Install Command
      description: "您使用的安装命令（脱敏后）"
      render: bash
      placeholder: |
        sh OracleShellInstall.sh -install_mode single -lf eth0 -o orcl -dp oracle -opd Y
    validations:
      required: true

  - type: input
    id: install_time
    attributes:
      label: 安装耗时 / Install Duration
      description: "例如: 约 20 分钟"
      placeholder: "约 20 分钟"
    validations:
      required: true

  - type: textarea
    id: install_log
    attributes:
      label: 安装过程日志 / Install Log (可选)
      description: "粘贴安装过程的关键输出日志"
      render: text

  - type: textarea
    id: verification
    attributes:
      label: 验证结果 / Verification
      description: "数据库连接测试、监听状态等验证信息"
      render: bash
      placeholder: |
        sqlplus / as sysdba
        show parameter db_name
        lsnrctl status
    validations:
      required: true

  - type: textarea
    id: experience
    attributes:
      label: 使用感受 / Experience
      description: "您的真实体验，比如相比手动安装的效率提升等"
      placeholder: "相比手动安装，节省了大量时间..."
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: 署名 / Author Name
      description: "您希望在案例页面上显示的名字"
      placeholder: "DBA张三"
    validations:
      required: true
