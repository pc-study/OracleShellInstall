let curMode='single';

function renderForm(m){
  const a=document.getElementById('formArea');
  const gs=[...P.common,...(P[m]||[])];
  const isEn = currentLang === 'en';
  let h='';
  gs.forEach(g=>{
    h+=`<div class="fg-title"><span class="ico">${g.ico}</span> ${isEn ? g.ge : g.g}</div><div class="fg-grid">`;
    g.f.forEach(f=>{
      const id='f'+f.fl.replace(/-/g,'_');
      const rb=f.req?`<span class="fl fl-r">${isEn?'Required':'必填'}</span>`:`<span class="fl fl-o">${isEn?'Optional':'选填'}</span>`;
      const label = isEn ? (f.lbe || f.lb) : f.lb;
      const placeholder = isEn ? (f.phe || f.ph || '') : (f.ph || '');
      h+=`<div class="field"><label for="${id}">${rb} <span class="fp">${f.fl}</span> ${label}</label>`;
      if(f.t==='select'){
        h+=`<select id="${id}"${f.req?' aria-required="true"':''} onchange="genCmd()">`;
        f.opts.forEach(o=>{h+=`<option value="${o}"${o===f.def?' selected':''}>${o}</option>`;});
        h+='</select>';
      }else{
        const tp=f.t==='password'?'password':'text';
        h+=`<input type="${tp}" id="${id}" value="${f.def||''}" placeholder="${placeholder}"${f.req?' aria-required="true"':''} oninput="genCmd()">`;
      }
      h+='</div>';
    });
    h+='</div>';
  });
  a.innerHTML=h;
  genCmd();
}

function genCmd(){
  const gs=[...P.common,...(P[curMode]||[])];
  let parts=[];
  let missingReq=false;
  gs.forEach(g=>g.f.forEach(f=>{
    const el=document.getElementById('f'+f.fl.replace(/-/g,'_'));
    if(!el)return;
    const v=el.value.trim();
    const field=el.closest('.field');
    // Validate required fields
    if(f.req && !v){
      if(field) field.classList.add('field-error');
      missingReq=true;
      return;
    }
    if(field) field.classList.remove('field-error');
    if(!v)return;
    if(f.def!==undefined&&v===String(f.def))return;
    parts.push({fl:f.fl,v,lb:f.lb,lbe:f.lbe||f.lb});
  }));
  const ml={single:currentLang==='en'?'Single Instance':'单机模式',standalone:currentLang==='en'?'Standalone ASM':'单机 ASM 模式',rac:currentLang==='en'?'RAC Cluster':'RAC 集群模式'};
  let lines=[];
  lines.push(`<span class="cm-w">sh OracleShellInstall.sh</span> <span class="cm-sl">\\</span>`);
  lines.push(`<span class="cm-flag">-install_mode</span> <span class="cm-val">${curMode}</span> <span class="cm-cmt">\`# ${ml[curMode]}\`</span><span class="cm-sl">\\</span>`);
  parts.forEach((p,i)=>{
    const ev=p.v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const sl=i===parts.length-1?'':'<span class="cm-sl">\\</span>';
    lines.push(`<span class="cm-flag">${p.fl}</span> <span class="cm-val">${ev}</span> <span class="cm-cmt">\`# ${currentLang==='en'?p.lbe:p.lb}\`</span>${sl}`);
  });
  if(missingReq){
    const warn=currentLang==='en'?'# ⚠ Fill in the required fields above, and the install command will be generated here in real time':'# ⚠ 填写上方必填参数后，安装命令将在此实时生成';
    lines.push(`\n<span class="cm-cmt">${warn}</span>`);
  }
  document.getElementById('cmdOutput').innerHTML=lines.join('\n');
}

function switchMode(m){
  curMode=m;
  document.querySelectorAll('.mode-card').forEach(c=>c.classList.toggle('active',c.dataset.mode===m));
  renderForm(m);
}
function resetForm(){renderForm(curMode);}
function copyCmd(){
  const t=document.getElementById('cmdOutput').textContent;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById('copyBtn');
    const isEn = currentLang === 'en';
    b.textContent=isEn?'Copied':'已复制';b.classList.add('copied');
    setTimeout(()=>{b.textContent=isEn?'Copy Command':'复制命令';b.classList.remove('copied');},2000);
  }).catch(()=>{
    // Fallback: select text in cmd output for manual copy
    const range = document.createRange();
    range.selectNodeContents(document.getElementById('cmdOutput'));
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
}
