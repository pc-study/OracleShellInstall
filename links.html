<style>
.links-hero{padding:100px 0 40px;text-align:center}
.links-hero-eye{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:600;color:var(--text-muted);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:18px}
.links-hero-eye::before,.links-hero-eye::after{content:'';width:28px;height:1px;background:var(--border-light)}
.links-hero h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:900;color:var(--text);margin-bottom:14px}
.links-hero p{color:var(--text-dim);font-size:.95rem;max-width:600px;margin:0 auto;line-height:1.75}

.links-filter{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 0 12px}
.links-tag-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);
  color:var(--text-dim);font-size:.78rem;cursor:pointer;transition:all .2s;font-family:var(--font)}
.links-tag-btn:hover{border-color:var(--border-light);color:var(--text)}
.links-tag-btn.active{background:var(--red);border-color:var(--red);color:#fff}

.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:28px 0 80px}
.link-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px 24px;
  transition:all .3s;box-shadow:var(--shadow-card);text-decoration:none;display:block}
.link-card:hover{border-color:var(--border-light);transform:translateY(-2px);box-shadow:var(--shadow-card-hover)}
.link-card-header{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.link-card-icon{width:44px;height:44px;border-radius:var(--r);object-fit:contain;background:var(--bg2);flex-shrink:0}
.link-card-letter{width:44px;height:44px;border-radius:var(--r);background:linear-gradient(135deg,var(--red),var(--accent2));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.1rem;
  font-family:var(--display);flex-shrink:0}
.link-card-info{min-width:0}
.link-card-name{font-size:.95rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.link-card-tag{font-size:.68rem;padding:2px 7px;border-radius:var(--r-sm);background:var(--bg2);
  border:1px solid var(--border);color:var(--text-muted);font-family:var(--mono)}
.link-card-desc{font-size:.82rem;color:var(--text-dim);line-height:1.7;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.links-empty{text-align:center;padding:80px 0;color:var(--text-muted)}
.links-empty-icon{font-size:3rem;margin-bottom:16px;opacity:.4}
.links-empty p{font-size:.95rem;margin-bottom:20px}

.links-cta{text-align:center;padding:0 0 80px}
.links-cta p{color:var(--text-dim);font-size:.92rem;margin-bottom:16px}
</style>

<body>

<!-- HERO -->
<section class="links-hero bg-grid">
  <div class="container">
    <div class="links-hero-eye" data-i18n="linksEye">FRIENDS</div>
    <h1 data-i18n="linksTitle">友情链接</h1>
    <p data-i18n="linksDesc">感谢这些优秀的开源项目和技术社区，一起让 DBA 的工作更高效。</p>
  </div>
</section>

<!-- FILTER TAGS -->
<section>
  <div class="container">
    <div id="linksFilter" class="links-filter"></div>
  </div>
</section>

<!-- CARD GRID -->
<section>
  <div class="container">
    <div id="linksGrid" class="links-grid"></div>
    <div id="linksEmpty" class="links-empty" style="display:none">
      <div class="links-empty-icon">&#128279;</div>
      <p data-i18n="linksEmptyText">暂无友情链接，敬请期待。</p>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="links-cta">
  <div class="container">
    <p data-i18n="linksCtaText">如果您有优质的开源项目想要交换友链，欢迎联系我们。</p>
    <a href="mailto:pc1107750981@163.com" class="btn btn-primary" data-i18n="linksCtaBtn">申请友链 &rarr;</a>
  </div>
</section>

<div id="footer"></div>
<script src="js/shared.js?v=20260324b"></script>
<script>
document.getElementById('nav').innerHTML = navHTML();
document.getElementById('footer').innerHTML = footerHTML();

function escapeHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Render link cards
fetch('links.json')
  .then(function(r){ return r.json() })
  .then(function(links){
    var grid = document.getElementById('linksGrid');
    var empty = document.getElementById('linksEmpty');
    var filter = document.getElementById('linksFilter');

    if (!links || links.length === 0) {
      grid.style.display = 'none';
      empty.style.display = 'block';
      return;
    }

    // Collect all tags for filter
    var allTags = [];
    links.forEach(function(lk){
      (lk.tags || []).forEach(function(tag){
        if (allTags.indexOf(tag) === -1) allTags.push(tag);
      });
    });

    // Render filter buttons
    if (allTags.length > 0) {
      var filterHtml = '<button class="links-tag-btn active" data-tag="all">' +
        (currentLang==='en'?'All':'全部') + '</button>';
      allTags.forEach(function(tag){
        filterHtml += '<button class="links-tag-btn" data-tag="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</button>';
      });
      filter.innerHTML = filterHtml;

      // Filter click handler
      filter.addEventListener('click', function(e){
        var btn = e.target.closest('.links-tag-btn');
        if (!btn) return;
        filter.querySelectorAll('.links-tag-btn').forEach(function(b){ b.classList.remove('active') });
        btn.classList.add('active');
        var tag = btn.getAttribute('data-tag');
        var cards = grid.querySelectorAll('.link-card');
        cards.forEach(function(card){
          if (tag === 'all') { card.style.display = ''; return; }
          var cardTags = card.getAttribute('data-tags') || '';
          card.style.display = cardTags.indexOf(tag) !== -1 ? '' : 'none';
        });
      });
    }

    // Render cards
    grid.innerHTML = links.map(function(lk){
      var tagsStr = (lk.tags||[]).join(',');
      var iconHtml;
      if (lk.icon) {
        iconHtml = '<img class="link-card-icon" src="' + escapeHtml(lk.icon) + '" alt="' + escapeHtml(lk.name) + '" loading="lazy">';
      } else {
        // First letter placeholder
        var letter = (lk.name||'?').charAt(0).toUpperCase();
        iconHtml = '<div class="link-card-letter">' + escapeHtml(letter) + '</div>';
      }
      var desc = currentLang === 'en' ? (lk.descEn || lk.desc || '') : (lk.desc || '');
      var tagsHtml = (lk.tags||[]).map(function(tag){
        return '<span class="link-card-tag">' + escapeHtml(tag) + '</span>';
      }).join('');

      return '<a href="' + escapeHtml(lk.url) + '" class="link-card" data-tags="' + escapeHtml(tagsStr) + '" target="_blank" rel="noopener noreferrer">' +
        '<div class="link-card-header">' + iconHtml +
          '<div class="link-card-info"><div class="link-card-name">' + escapeHtml(lk.name) + '</div>' +
          '<div class="link-card-tags">' + tagsHtml + '</div></div></div>' +
        '<div class="link-card-desc">' + escapeHtml(desc) + '</div>' +
      '</a>';
    }).join('');
  })
  .catch(function(){
    document.getElementById('linksGrid').style.display = 'none';
    document.getElementById('linksEmpty').style.display = 'block';
  });

var pageI18n = {
  zh: {
    linksEye:'FRIENDS',linksTitle:'友情链接',
    linksDesc:'感谢这些优秀的开源项目和技术社区，一起让 DBA 的工作更高效。',
    linksEmptyText:'暂无友情链接，敬请期待。',
    linksCtaText:'如果您有优质的开源项目想要交换友链，欢迎联系我们。',linksCtaBtn:'申请友链 →',
    links:'友情链接'
  },
  en: {
    linksEye:'FRIENDS',linksTitle:'Friends & Links',
    linksDesc:'Great open-source projects and tech communities that make DBA work more efficient.',
    linksEmptyText:'No links yet. Stay tuned.',
    linksCtaText:'Have a great open-source project? Contact us for link exchange.',linksCtaBtn:'Request Link →',
    links:'Links'
  }
};
Object.assign(i18n.zh, pageI18n.zh);
Object.assign(i18n.en, pageI18n.en);
if (currentLang !== 'zh') setLang(currentLang);
</script>
